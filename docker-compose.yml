version: "3.8"

services:
  redis:
    image: redis:alpine

  api:
    build: .
    command: npm start
    ports:
      - "8060:8060"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5139:80"
    depends_on:
      - api

  worker:
    build: .
    command: node src/worker.js
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
